name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PhoneValidate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PhoneValidate.sln

      - name: Build
        run: dotnet build PhoneValidate.sln -c Release --no-restore

      # E2E tests are excluded here: they require a live API server.
      # Unit and integration tests are self-contained.
      - name: Test (unit + integration)
        run: |
          dotnet test PhoneValidate.Unit.Tests/PhoneValidate.Unit.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test PhoneValidate.Integration.Tests/PhoneValidate.Integration.Tests.csproj -c Release --no-build --verbosity normal
