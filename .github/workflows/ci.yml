name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PhoneValidate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PhoneValidate.sln

      - name: Verify formatting
        run: dotnet format PhoneValidate.sln --verify-no-changes --no-restore

      - name: Build (warnings as errors)
        run: dotnet build PhoneValidate.sln -c Release --no-restore -warnaserror

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PhoneValidate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PhoneValidate.sln

      - name: Build
        run: dotnet build PhoneValidate.sln -c Release --no-restore

      - name: Unit tests
        run: dotnet test PhoneValidate.Unit.Tests/PhoneValidate.Unit.Tests.csproj -c Release --no-build --verbosity normal

      - name: Integration tests
        run: dotnet test PhoneValidate.Integration.Tests/PhoneValidate.Integration.Tests.csproj -c Release --no-build --verbosity normal

      # E2E tests are intentionally excluded: they require a live API server
      # (they hit http://localhost:5000). Run them locally against a running
      # `docker compose up` stack.
